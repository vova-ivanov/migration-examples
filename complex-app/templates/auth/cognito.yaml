AWSTemplateFormatVersion: "2010-09-09"
Description: Cognito User Pool with app client, domain, and user groups

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]

  UserPoolEmailFrom:
    Type: String
    Default: ""
    Description: Source email address for Cognito emails (leave blank to use Cognito default)

  PasswordMinLength:
    Type: Number
    Default: 8
    MinValue: 6
    MaxValue: 99

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Resources:

  # ── User Pool ────────────────────────────────────────────────────────────────

  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Delete
    Properties:
      UserPoolName: !Sub "app-users-${Environment}"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinLength
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  # ── User Pool App Client ──────────────────────────────────────────────────────

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "app-client-${Environment}"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      ReadAttributes:
        - email
        - email_verified
        - given_name
        - family_name
      WriteAttributes:
        - email
        - given_name
        - family_name

  # ── User Pool Domain ─────────────────────────────────────────────────────────

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "app-auth-${Environment}-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  # ── User Groups ──────────────────────────────────────────────────────────────

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admins
      UserPoolId: !Ref UserPool
      Description: Platform administrators with full access
      Precedence: 1

  ModeratorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: moderators
      UserPoolId: !Ref UserPool
      Description: Content moderators with limited write access
      Precedence: 10

  ViewerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: viewers
      UserPoolId: !Ref UserPool
      Description: Read-only access users
      Precedence: 100

Outputs:
  UserPoolId:
    Value: !Ref UserPool
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolId"

  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolArn"

  UserPoolClientId:
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolClientId"

  UserPoolDomain:
    Value: !Sub "https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolDomain"
