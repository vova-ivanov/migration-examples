AWSTemplateFormatVersion: "2010-09-09"
Description: Background worker Lambda — processes SQS jobs, transforms assets, sends notifications

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]

  MemoryMB:
    Type: Number
    Default: 512

  EnableXRay:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

  LogRetentionDays:
    Type: Number
    Default: 14

  ExecutionRoleArn:
    Type: String

  UtilsLayerArn:
    Type: String

  ItemsTableName:
    Type: String

  AssetsBucketName:
    Type: String

  JobsQueueUrl:
    Type: String

  JobsQueueArn:
    Type: String

  NotificationsTopicArn:
    Type: String

Conditions:
  XRayEnabled: !Equals [!Ref EnableXRay, "true"]
  IsProd: !Equals [!Ref Environment, prod]

Resources:

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/app-worker-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  WorkerFunction:
    Type: AWS::Lambda::Function
    DependsOn: WorkerLogGroup
    Properties:
      FunctionName: !Sub "app-worker-${Environment}"
      Runtime: python3.12
      Handler: index.handler
      Role: !Ref ExecutionRoleArn
      MemorySize: !Ref MemoryMB
      Timeout: 300
      Architectures:
        - x86_64
      TracingConfig:
        Mode: !If [XRayEnabled, Active, PassThrough]
      Layers:
        - !Ref UtilsLayerArn
      Environment:
        Variables:
          ENV: !Ref Environment
          ITEMS_TABLE: !Ref ItemsTableName
          ASSETS_BUCKET: !Ref AssetsBucketName
          JOBS_QUEUE_URL: !Ref JobsQueueUrl
          NOTIFICATIONS_TOPIC: !Ref NotificationsTopicArn
          LOG_LEVEL: !If [IsProd, WARNING, INFO]
          MAX_BATCH_SIZE: "10"
      Code:
        ZipFile: |
          import json
          import os
          import logging
          import boto3
          from datetime import datetime, timezone

          logger = logging.getLogger()
          logger.setLevel(os.environ.get("LOG_LEVEL", "INFO"))

          dynamo   = boto3.resource("dynamodb")
          s3       = boto3.client("s3")
          sns      = boto3.client("sns")

          items_table = dynamo.Table(os.environ["ITEMS_TABLE"])
          ASSETS_BUCKET = os.environ["ASSETS_BUCKET"]
          NOTIFICATIONS_TOPIC = os.environ["NOTIFICATIONS_TOPIC"]


          def handler(event, context):
              records = event.get("Records", [])
              results = {"processed": 0, "failed": 0, "batchItemFailures": []}

              for record in records:
                  message_id = record.get("messageId", "?")
                  try:
                      body = json.loads(record.get("body", "{}"))
                      _process_job(body)
                      results["processed"] += 1
                      logger.info(f"processed message {message_id}: {body.get('eventType')}")
                  except Exception as exc:
                      logger.error(f"failed message {message_id}: {exc}", exc_info=True)
                      results["failed"] += 1
                      results["batchItemFailures"].append({"itemIdentifier": message_id})

              return {"batchItemFailures": results["batchItemFailures"]}

          def _process_job(body):
              event_type = body.get("eventType", "unknown")
              payload    = body.get("payload", {})

              dispatch = {
                  "item.created":     _on_item_created,
                  "item.deleted":     _on_item_deleted,
                  "asset.uploaded":   _on_asset_uploaded,
                  "report.requested": _on_report_requested,
              }

              fn = dispatch.get(event_type)
              if fn:
                  fn(payload)
              else:
                  logger.warning(f"unknown event type: {event_type}")

          def _on_item_created(payload):
              item_id = payload.get("itemId")
              if not item_id:
                  return
              items_table.update_item(
                  Key={"id": item_id},
                  UpdateExpression="SET #status = :s, processedAt = :t",
                  ExpressionAttributeNames={"#status": "status"},
                  ExpressionAttributeValues={
                      ":s": "active",
                      ":t": datetime.now(timezone.utc).isoformat(),
                  },
              )
              _notify("job_completed", {"itemId": item_id, "action": "created"})

          def _on_item_deleted(payload):
              item_id = payload.get("itemId")
              if not item_id:
                  return
              # Clean up any associated assets
              prefix = f"items/{item_id}/"
              paginator = s3.get_paginator("list_objects_v2")
              for page in paginator.paginate(Bucket=ASSETS_BUCKET, Prefix=prefix):
                  objects = [{"Key": o["Key"]} for o in page.get("Contents", [])]
                  if objects:
                      s3.delete_objects(Bucket=ASSETS_BUCKET,
                                        Delete={"Objects": objects})
              _notify("job_completed", {"itemId": item_id, "action": "deleted"})

          def _on_asset_uploaded(payload):
              key = payload.get("key")
              if not key:
                  return
              meta = s3.head_object(Bucket=ASSETS_BUCKET, Key=key)
              size = meta.get("ContentLength", 0)
              logger.info(f"asset uploaded: {key} ({size} bytes)")
              _notify("job_completed", {"key": key, "size": size, "action": "asset_processed"})

          def _on_report_requested(payload):
              report_type = payload.get("reportType", "summary")
              owner_id    = payload.get("ownerId")
              result = items_table.query(
                  IndexName="OwnerIndex",
                  KeyConditionExpression="ownerId = :oid",
                  ExpressionAttributeValues={":oid": owner_id},
              )
              items = result.get("Items", [])
              report = {
                  "reportType": report_type,
                  "ownerId": owner_id,
                  "generatedAt": datetime.now(timezone.utc).isoformat(),
                  "totalItems": len(items),
                  "statusBreakdown": _count_by_status(items),
              }
              key = f"reports/{owner_id}/{report_type}-{int(datetime.now(timezone.utc).timestamp())}.json"
              s3.put_object(
                  Bucket=ASSETS_BUCKET,
                  Key=key,
                  Body=json.dumps(report),
                  ContentType="application/json",
              )
              _notify("job_completed", {"ownerId": owner_id, "reportKey": key})

          def _count_by_status(items):
              counts = {}
              for item in items:
                  s = item.get("status", "unknown")
                  counts[s] = counts.get(s, 0) + 1
              return counts

          def _notify(event_type, payload):
              try:
                  sns.publish(
                      TopicArn=NOTIFICATIONS_TOPIC,
                      Message=json.dumps({"eventType": event_type, "payload": payload}),
                      MessageAttributes={
                          "eventType": {
                              "DataType": "String",
                              "StringValue": event_type,
                          }
                      },
                  )
              except Exception as exc:
                  logger.error(f"failed to publish notification: {exc}")
      Tags:
        - Key: Environment
          Value: !Ref Environment

  WorkerEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      FunctionName: !GetAtt WorkerFunction.Arn
      EventSourceArn: !Ref JobsQueueArn
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      FunctionResponseTypes:
        - ReportBatchItemFailures

Outputs:
  WorkerFunctionArn:
    Value: !GetAtt WorkerFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-WorkerFunctionArn"

  WorkerFunctionName:
    Value: !Ref WorkerFunction
    Export:
      Name: !Sub "${AWS::StackName}-WorkerFunctionName"
