AWSTemplateFormatVersion: "2010-09-09"
Description: IAM roles and policies for Lambda functions and Step Functions

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]

  ItemsTableArn:
    Type: String

  UsersTableArn:
    Type: String

  SessionsTableArn:
    Type: String

  AssetsBucketArn:
    Type: String

  LogsBucketArn:
    Type: String

  JobsQueueArn:
    Type: String

  NotificationsTopicArn:
    Type: String

Resources:

  # ── Shared Managed Policy — CloudWatch Logs ──────────────────────────────────

  LambdaLogsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "app-lambda-logs-${Environment}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
          - Effect: Allow
            Action:
              - xray:PutTraceSegments
              - xray:PutTelemetryRecords
            Resource: "*"

  # ── API Lambda Role ──────────────────────────────────────────────────────────

  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "app-api-lambda-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref LambdaLogsPolicy
      Policies:
        - PolicyName: DynamoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Ref ItemsTableArn
                  - !Sub "${ItemsTableArn}/index/*"
                  - !Ref UsersTableArn
                  - !Sub "${UsersTableArn}/index/*"
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GeneratePresignedUrl
                Resource: !Sub "${AssetsBucketArn}/*"
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Ref AssetsBucketArn
        - PolicyName: SqsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueAttributes
                Resource: !Ref JobsQueueArn

  # ── Auth Lambda Role ─────────────────────────────────────────────────────────

  AuthLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "app-auth-lambda-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref LambdaLogsPolicy
      Policies:
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminListGroupsForUser
                  - cognito-idp:GetUser
                Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"
        - PolicyName: SessionsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource:
                  - !Ref SessionsTableArn
                  - !Sub "${SessionsTableArn}/index/*"

  # ── Worker Lambda Role ───────────────────────────────────────────────────────

  WorkerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "app-worker-lambda-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref LambdaLogsPolicy
      Policies:
        - PolicyName: FullDataAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Ref ItemsTableArn
                  - !Sub "${ItemsTableArn}/index/*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Ref AssetsBucketArn
                  - !Sub "${AssetsBucketArn}/*"
        - PolicyName: QueueAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource: !Ref JobsQueueArn
        - PolicyName: NotificationsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref NotificationsTopicArn

  # ── Step Functions Role ──────────────────────────────────────────────────────

  StatesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "app-states-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub "states.${AWS::Region}.amazonaws.com"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:app-*-${Environment}"
        - PolicyName: PublishNotifications
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref NotificationsTopicArn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutLogEvents
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: "*"

Outputs:
  ApiLambdaRoleArn:
    Value: !GetAtt ApiLambdaRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ApiLambdaRoleArn"

  AuthLambdaRoleArn:
    Value: !GetAtt AuthLambdaRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AuthLambdaRoleArn"

  WorkerLambdaRoleArn:
    Value: !GetAtt WorkerLambdaRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-WorkerLambdaRoleArn"

  StatesRoleArn:
    Value: !GetAtt StatesRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-StatesRoleArn"
