AWSTemplateFormatVersion: "2010-09-09"
Description: S3 buckets — assets, logs, and deployment artifacts

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]

  LogRetentionDays:
    Type: Number
    Default: 14

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Resources:

  # ── Logs Bucket ──────────────────────────────────────────────────────────────

  LogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "app-logs-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: !Ref LogRetentionDays
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: BucketPurpose
          Value: logs

  # ── Assets Bucket ────────────────────────────────────────────────────────────

  AssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "app-assets-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            ExposedHeaders: [ETag]
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: BucketPurpose
          Value: assets

  # ── Deployments Bucket ───────────────────────────────────────────────────────

  DeploymentsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "app-deployments-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldDeployments
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
          - Id: AbortIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: BucketPurpose
          Value: deployments

Outputs:
  AssetsBucketName:
    Value: !Ref AssetsBucket
    Export:
      Name: !Sub "${AWS::StackName}-AssetsBucketName"

  AssetsBucketArn:
    Value: !GetAtt AssetsBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AssetsBucketArn"

  LogsBucketName:
    Value: !Ref LogsBucket
    Export:
      Name: !Sub "${AWS::StackName}-LogsBucketName"

  LogsBucketArn:
    Value: !GetAtt LogsBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LogsBucketArn"

  DeploymentsBucketName:
    Value: !Ref DeploymentsBucket
    Export:
      Name: !Sub "${AWS::StackName}-DeploymentsBucketName"

  DeploymentsBucketArn:
    Value: !GetAtt DeploymentsBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DeploymentsBucketArn"
