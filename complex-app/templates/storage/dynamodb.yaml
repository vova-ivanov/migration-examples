AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB tables — items, users, and sessions with GSIs and TTL

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]

  PointInTimeRecovery:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable point-in-time recovery (recommended for prod)

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  EnablePITR: !Or
    - !Equals [!Ref PointInTimeRecovery, "true"]
    - !Equals [!Ref Environment, prod]

Resources:

  # ── Items Table ──────────────────────────────────────────────────────────────

  ItemsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    Properties:
      TableName: !Sub "app-items-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [EnablePITR, true, false]
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: ownerId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OwnerIndex
          KeySchema:
            - AttributeName: ownerId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes: [id, ownerId, title, updatedAt]
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: TableType
          Value: items

  # ── Users Table ──────────────────────────────────────────────────────────────

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    Properties:
      TableName: !Sub "app-users-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [EnablePITR, true, false]
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: TableType
          Value: users

  # ── Sessions Table ───────────────────────────────────────────────────────────

  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    Properties:
      TableName: !Sub "app-sessions-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserSessionsIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: TableType
          Value: sessions

Outputs:
  ItemsTableName:
    Value: !Ref ItemsTable
    Export:
      Name: !Sub "${AWS::StackName}-ItemsTableName"

  ItemsTableArn:
    Value: !GetAtt ItemsTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ItemsTableArn"

  ItemsTableStreamArn:
    Value: !GetAtt ItemsTable.StreamArn

  UsersTableName:
    Value: !Ref UsersTable
    Export:
      Name: !Sub "${AWS::StackName}-UsersTableName"

  UsersTableArn:
    Value: !GetAtt UsersTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-UsersTableArn"

  SessionsTableName:
    Value: !Ref SessionsTable
    Export:
      Name: !Sub "${AWS::StackName}-SessionsTableName"

  SessionsTableArn:
    Value: !GetAtt SessionsTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-SessionsTableArn"
