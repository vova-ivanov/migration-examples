        - Key: Name
          Value: !Sub "app-data-a-${Environment}"
        - Key: Environment
          Value: !Ref Environment

  DataSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AppVpc
