Resources:
  JobsDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "app-jobs-dlq-${Environment}"
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  JobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "app-jobs-${Environment}"
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt JobsDlq.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  NotificationsDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "app-notifications-dlq-${Environment}"
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  NotificationsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "app-notifications-${Environment}"
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationsDlq.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  JobsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref JobsQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowLambdaSend
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt JobsQueue.Arn
          - Sid: AllowAccountSend
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sqs:SendMessage
            Resource: !GetAtt JobsQueue.Arn
