Resources:
  CleanupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/app-cleanup-${Environment}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Environment
          Value: !Ref Environment

  CleanupFunction:
    Type: AWS::Lambda::Function
    DependsOn: CleanupLogGroup
    Properties:
      FunctionName: !Sub "app-cleanup-${Environment}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CleanupRole.Arn
      MemorySize: !Ref LambdaMemoryMB
      Timeout: 300
      Layers:
        - !Ref UtilsLayer
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
      TracingConfig:
        Mode: !If [XRayEnabled, Active, PassThrough]
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              return {'statusCode': 200, 'body': json.dumps({'cleaned': True, 'event': str(event)})}
      Tags:
        - Key: Environment
          Value: !Ref Environment
